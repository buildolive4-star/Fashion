<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#008069">
    <title>Live Support - WhatsApp UI</title>
    
    <!-- Exact WhatsApp Android Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Full Screen Mobile Container */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            background-color: #efeae2;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Top Header (Nav Bar) */
        .header {
            background-color: #008069;
            color: white;
            display: flex;
            align-items: center;
            padding: 10px 5px;
            height: 60px;
            z-index: 10;
        }

        .back-section { display: flex; align-items: center; cursor: pointer; border-radius: 20px; padding: 2px 4px; }
        .back-section .material-icons { font-size: 24px; margin-right: 2px; }
        .profile-pic { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #ccc; }
        
        .user-info { flex: 1; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .name { font-size: 16.5px; font-weight: 500; }
        .status { font-size: 12.5px; opacity: 0.9; margin-top: 2px; }

        .header-actions { display: flex; padding-right: 15px; align-items: center; gap: 15px; }
        .header-actions .material-icons { font-size: 24px; cursor: pointer; }

        /* Chat Wallpaper & Area */
        .chat-container {
            flex: 1;
            padding: 15px 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Today Date Indicator */
        .date-badge {
            background-color: #ffffff;
            color: #54656f;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 10px;
            align-self: center;
            margin-bottom: 15px;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
            z-index: 2;
        }

        /* Messages */
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 8px; position: relative; cursor: pointer; }
        .msg-wrapper.sent { align-items: flex-end; }
        .msg-wrapper.received { align-items: flex-start; }

        .msg {
            max-width: 82%;
            padding: 6px 7px 8px 9px;
            border-radius: 7.5px;
            font-size: 15px;
            line-height: 20px;
            color: #111b21;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
            position: relative;
            word-wrap: break-word;
        }

        .msg img {
            max-width: 100%;
            border-radius: 5px;
            margin-bottom: 5px;
            display: block;
        }

        .msg.received { background-color: #ffffff; border-top-left-radius: 0; }
        .msg.sent { background-color: #d9fdd3; border-top-right-radius: 0; }

        .msg.received::before {
            content: ''; position: absolute; top: 0; left: -8px; width: 0; height: 0;
            border-top: 10px solid #ffffff; border-left: 10px solid transparent;
        }
        .msg.sent::before {
            content: ''; position: absolute; top: 0; right: -8px; width: 0; height: 0;
            border-top: 10px solid #d9fdd3; border-right: 10px solid transparent;
        }

        /* Message Time & Tick marks */
        .msg-info { float: right; margin: 6px 0 -5px 12px; display: inline-flex; align-items: center; gap: 4px; }
        .msg-time { font-size: 11px; color: #667781; }
        .tick-icon { width: 16px; height: 15px; }

        /* Bottom Input Area */
        .bottom-bar { display: flex; align-items: flex-end; padding: 5px; gap: 6px; background: transparent; margin-bottom: 5px; }

        .input-box {
            flex: 1;
            background: #ffffff;
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 10px 10px;
            min-height: 48px;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .input-box .material-icons { color: #8696a0; font-size: 24px; padding: 0 8px; cursor: pointer; }
        
        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 5px;
            margin-bottom: 2px;
            background: transparent;
        }

        .action-btn {
            width: 48px;
            height: 48px;
            background-color: #008069;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
            flex-shrink: 0;
        }
        .action-btn .material-icons { color: white; font-size: 24px; transition: transform 0.2s ease-in-out; }

        .chat-container::-webkit-scrollbar { display: none; }

        /* Secret Button in Middle of Screen */
        .secret-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: transparent;
            z-index: 100;
            border-radius: 50%;
        }

        /* Password Modal */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-box {
            background: white; padding: 20px; border-radius: 10px; width: 80%; text-align: center;
        }
        .modal-box input {
            width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;
        }
        .modal-box button {
            background: #008069; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer;
        }

        /* Admin Users List View */
        #adminUsersList {
            display: none;
            flex: 1;
            background: #ffffff;
            overflow-y: auto;
        }
        .user-list-item {
            display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer;
        }
        .user-list-item:hover { background-color: #f5f6f6; }
        .user-list-item .profile-pic { width: 50px; height: 50px; }
        .user-list-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .user-list-name { font-size: 17px; font-weight: 500; color: #111b21; margin-bottom: 3px; }
        .user-list-phone { font-size: 13px; color: #667781; }

        /* Loader */
        .loader {
            display: none; width: 24px; height: 24px; border: 3px solid rgba(0,128,105,0.3);
            border-radius: 50%; border-top-color: #008069; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <div class="header" id="appHeader">
            <div class="back-section" id="backBtn" style="display: none;" onclick="goBackToAdminList()">
                <span class="material-icons">arrow_back</span>
            </div>
            <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="Profile" class="profile-pic" id="headerProfilePic">
            <div class="user-info">
                <div class="name" id="headerName">Live Support</div>
                <div class="status" id="headerStatus">typically replies instantly</div>
            </div>
            <div class="header-actions">
                <span class="material-icons">videocam</span>
                <span class="material-icons">call</span>
                <span class="material-icons">more_vert</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container" id="chatContainer">
            <div class="date-badge">TODAY</div>
            <!-- Secret Admin Button -->
            <div class="secret-btn" onclick="openPasswordModal()"></div>
            
            <div id="messagesArea"></div>
        </div>

        <!-- Admin Users List (Hidden by default) -->
        <div id="adminUsersList"></div>

        <!-- Bottom Input Bar -->
        <div class="bottom-bar" id="bottomBar">
            <div class="input-box">
                <span class="material-icons" style="padding-left:0;">mood</span>
                <input type="text" id="msgInput" placeholder="Message" onkeypress="checkEnter(event)" autocomplete="off">
                <span class="material-icons" style="transform: rotate(-45deg);">attach_file</span>
                <!-- Hidden file input for images -->
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadAndSendImage(event)">
                <span class="material-icons" style="padding-right:0;" onclick="document.getElementById('imageInput').click()">photo_camera</span>
                <div class="loader" id="imgLoader" style="position: absolute; right: 15px;"></div>
            </div>
            <div class="action-btn" onclick="sendMsg()">
                <span class="material-icons" id="actionIcon">send</span>
            </div>
        </div>

        <!-- Password Modal for Admin -->
        <div class="modal-overlay" id="passwordModal">
            <div class="modal-box">
                <h3 style="color:#111b21;">Admin Access</h3>
                <input type="password" id="adminPassword" placeholder="Enter Passcode">
                <button onclick="verifyAdmin()">Login</button>
                <button style="background:#dc3545; margin-left:10px;" onclick="closePasswordModal()">Cancel</button>
            </div>
        </div>

    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration (From Previous Code)
        const firebaseConfig = {
          apiKey: "AIzaSyB0asuJKj9wyoInuS6_mhLdWDo4OkAM_k4",
          authDomain: "oooo-67c5c.firebaseapp.com",
          databaseURL: "https://oooo-67c5c-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "oooo-67c5c",
          storageBucket: "oooo-67c5c.firebasestorage.app",
          messagingSenderId: "605074662310",
          appId: "1:605074662310:web:aeb1610acf19a39413e567"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ImgBB API Key
        const IMGBB_API_KEY = "2fa045f121169adcec34f55432b505ae";

        // Fetch User Info from LocalStorage (Provided by main app)
        let savedUser = JSON.parse(localStorage.getItem('oooo_user_data'));
        let clientData = {
            name: savedUser ? savedUser.name : "Guest Client",
            phone: savedUser ? savedUser.phone : "Unknown_" + Math.floor(Math.random() * 10000)
        };

        // App States
        let currentMode = "client"; // 'client' or 'admin'
        let activeChatPhone = clientData.phone; 
        let activeChatListener = null;

        // UI Elements
        const chatContainer = document.getElementById('chatContainer');
        const messagesArea = document.getElementById('messagesArea');
        const msgInput = document.getElementById('msgInput');
        const actionIcon = document.getElementById('actionIcon');
        const adminUsersList = document.getElementById('adminUsersList');
        const bottomBar = document.getElementById('bottomBar');
        const headerName = document.getElementById('headerName');
        const headerStatus = document.getElementById('headerStatus');
        const backBtn = document.getElementById('backBtn');
        const headerProfilePic = document.getElementById('headerProfilePic');

        // Exact WhatsApp Checkmarks (SVGs)
        const singleTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#8696a0" d="M10.91 3.316l-.478-.372a.365.365 0 0 0-.51.063L5.666 9.879a.32.32 0 0 1-.484.033L3.89 8.587a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l1.547 1.512c.143.14.361.125.484-.033l4.982-6.393a.366.366 0 0 0-.064-.512z"/></svg>`;
        const doubleGreyTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#8696a0" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.32.32 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>`;
        const doubleBlueTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#53bdeb" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.32.32 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>`;

        // Init Client Chat Details in Firebase
        function initClientChat() {
            const userRef = ref(db, `chats/${clientData.phone}/userInfo`);
            set(userRef, {
                name: clientData.name,
                phone: clientData.phone,
                lastSeen: Date.now()
            });
            loadChatMessages(clientData.phone);
        }

        function formatTime(ms) {
            let d = new Date(ms);
            let h = d.getHours(), m = d.getMinutes();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        // Load Messages Logic
        function loadChatMessages(phone) {
            messagesArea.innerHTML = '';
            const messagesRef = ref(db, `chats/${phone}/messages`);
            
            if(activeChatListener) activeChatListener(); // Unsubscribe old
            
            activeChatListener = onValue(messagesRef, (snapshot) => {
                messagesArea.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).forEach(key => {
                        const msg = data[key];
                        renderMessage(key, msg, phone);
                        
                        // Automatically Mark Read based on who is viewing
                        if(currentMode === 'admin' && msg.sender === 'client' && msg.status !== 'read') {
                            update(ref(db, `chats/${phone}/messages/${key}`), { status: 'read' });
                        }
                        if(currentMode === 'client' && msg.sender === 'admin' && msg.status !== 'read') {
                            update(ref(db, `chats/${phone}/messages/${key}`), { status: 'read' });
                        }
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            });
        }

        // Render HTML for Message
        window.renderMessage = function(key, msg, phone) {
            let isSentByMe = (currentMode === 'client' && msg.sender === 'client') || (currentMode === 'admin' && msg.sender === 'admin');
            
            let tickHTML = "";
            if (isSentByMe) {
                if (msg.status === 'sent') tickHTML = singleTick;
                else if (msg.status === 'delivered') tickHTML = doubleGreyTick;
                else if (msg.status === 'read') tickHTML = doubleBlueTick;
            }

            let contentHTML = msg.type === 'image' 
                ? `<img src="${msg.text}" alt="Image">` 
                : `${msg.text}`;

            let alignmentClass = isSentByMe ? 'sent' : 'received';
            
            let msgHTML = `
                <div class="msg-wrapper ${alignmentClass}" onclick="promptDelete('${key}', '${phone}')">
                    <div class="msg ${alignmentClass}">
                        ${contentHTML}
                        <div class="msg-info">
                            <span class="msg-time">${formatTime(msg.timestamp)}</span>
                            ${tickHTML}
                        </div>
                    </div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', msgHTML);
        }

        // Send Text Message
        window.sendMsg = function() {
            let text = msgInput.value.trim();
            if (text === '') return;

            const newMsgRef = push(ref(db, `chats/${activeChatPhone}/messages`));
            set(newMsgRef, {
                text: text,
                sender: currentMode,
                type: 'text',
                timestamp: Date.now(),
                status: 'sent'
            });

            msgInput.value = '';
            
            // Simulate 'delivered' status logic for realism if client sends
            if(currentMode === 'client') {
                setTimeout(() => {
                    get(newMsgRef).then(snap => {
                        if(snap.exists() && snap.val().status === 'sent') {
                            update(newMsgRef, { status: 'delivered' });
                        }
                    });
                }, 1500);
            }
        }

        // Upload and Send Image
        window.uploadAndSendImage = async function(event) {
            const file = event.target.files[0];
            if(!file) return;

            document.getElementById('imgLoader').style.display = 'block';
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                const json = await res.json();
                
                if(json.success) {
                    const imgUrl = json.data.url;
                    const newMsgRef = push(ref(db, `chats/${activeChatPhone}/messages`));
                    set(newMsgRef, {
                        text: imgUrl,
                        sender: currentMode,
                        type: 'image',
                        timestamp: Date.now(),
                        status: 'sent'
                    });
                } else {
                    alert("Image Upload Failed");
                }
            } catch(e) {
                alert("Error Uploading Image");
            }
            
            document.getElementById('imgLoader').style.display = 'none';
            event.target.value = ""; // reset input
        }

        // Delete Message
        window.promptDelete = function(msgKey, phone) {
            if(confirm("Delete this message?")) {
                remove(ref(db, `chats/${phone}/messages/${msgKey}`));
            }
        }

        window.checkEnter = function(e) {
            if (e.key === 'Enter') sendMsg();
        }

        /* =========================================
           SECRET ADMIN MODE LOGIC
        ========================================= */
        window.openPasswordModal = function() {
            document.getElementById('passwordModal').style.display = 'flex';
        }

        window.closePasswordModal = function() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        window.verifyAdmin = function() {
            const pass = document.getElementById('adminPassword').value;
            if(pass === "1234") {
                closePasswordModal();
                enableAdminDashboard();
            } else {
                alert("Incorrect Passcode!");
            }
        }

        function enableAdminDashboard() {
            currentMode = "admin";
            chatContainer.style.display = 'none';
            bottomBar.style.display = 'none';
            adminUsersList.style.display = 'block';
            backBtn.style.display = 'none';
            
            headerName.innerText = "Admin Dashboard";
            headerStatus.innerText = "All Client Chats";
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2021/08/04/13/06/software-developer-6521720_1280.jpg";

            // Load all clients
            const chatsRef = ref(db, 'chats');
            onValue(chatsRef, (snapshot) => {
                adminUsersList.innerHTML = '';
                const data = snapshot.val();
                if(data && currentMode === 'admin') {
                    Object.keys(data).forEach(phone => {
                        const user = data[phone].userInfo || { name: 'Unknown', phone: phone };
                        
                        // Get Last Message
                        let lastMsgText = "No messages";
                        let lastMsgTime = "";
                        if(data[phone].messages) {
                            const msgs = Object.values(data[phone].messages);
                            const lastMsg = msgs[msgs.length - 1];
                            lastMsgText = lastMsg.type === 'image' ? "📷 Photo" : lastMsg.text;
                            lastMsgTime = formatTime(lastMsg.timestamp);
                        }

                        let userHTML = `
                            <div class="user-list-item" onclick="openAdminChat('${phone}', '${user.name}')">
                                <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="profile-pic">
                                <div class="user-list-details">
                                    <div class="user-list-name">${user.name} <span style="float:right; font-size:12px; font-weight:normal; color:#667781;">${lastMsgTime}</span></div>
                                    <div class="user-list-phone">${lastMsgText}</div>
                                </div>
                            </div>
                        `;
                        adminUsersList.insertAdjacentHTML('beforeend', userHTML);
                    });
                }
            });
        }

        window.openAdminChat = function(phone, name) {
            activeChatPhone = phone;
            adminUsersList.style.display = 'none';
            chatContainer.style.display = 'flex';
            bottomBar.style.display = 'flex';
            backBtn.style.display = 'flex';

            headerName.innerText = name;
            headerStatus.innerText = phone;
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png";

            loadChatMessages(phone);
        }

        window.goBackToAdminList = function() {
            chatContainer.style.display = 'none';
            bottomBar.style.display = 'none';
            adminUsersList.style.display = 'block';
            backBtn.style.display = 'none';
            
            headerName.innerText = "Admin Dashboard";
            headerStatus.innerText = "All Client Chats";
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2021/08/04/13/06/software-developer-6521720_1280.jpg";
            activeChatPhone = null;
            if(activeChatListener) activeChatListener(); // Stop listening to specific chat
        }

        // Boot Application
        if (currentMode === "client") {
            initClientChat();
        }

    </script>
</body>
</html>
