<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#008069">
    <title>Live Support - WhatsApp UI</title>
    
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --wa-teal-dark: #008069;
            --wa-teal-light: #00a884;
            --wa-bg-color: #efeae2;
            --wa-msg-sent: #d9fdd3;
            --wa-msg-received: #ffffff;
            --wa-text-primary: #111b21;
            --wa-text-secondary: #667781;
            --wa-shadow-light: rgba(11, 20, 26, 0.08);
            --wa-shadow-medium: rgba(0, 0, 0, 0.15);
        }

        /* Global Reset & Strict Body Lock for Mobile Keyboard */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        html, body {
            width: 100%;
            height: 100%;
            position: fixed; /* Prevents whole screen scrolling on mobile keypad popup */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            background-color: #0c1317;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Container - Dynamic Height Control */
        .app-container {
            width: 100%;
            height: 100%;
            height: 100dvh; /* Dynamic Viewport Height */
            max-width: 450px;
            background-color: var(--wa-bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-height: 700px) and (min-width: 500px) {
            .app-container {
                height: 94vh;
                border-radius: 18px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            }
        }

        /* Header - Always Fixed at Top */
        .header {
            background-color: var(--wa-teal-dark);
            color: white;
            display: flex;
            align-items: center;
            padding: 10px 14px;
            height: 62px;
            z-index: 10;
            box-shadow: 0 2px 6px var(--wa-shadow-medium);
            flex-shrink: 0; /* Header won't resize or vanish */
        }

        .back-section { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            border-radius: 50%; 
            padding: 6px; 
            margin-right: 4px;
            transition: background 0.2s ease;
        }
        .back-section:active { background: rgba(255,255,255,0.2); }
        .back-section .material-icons { font-size: 24px; }

        .profile-pic-wrapper {
            position: relative;
            margin-right: 12px;
            cursor: pointer;
        }

        .profile-pic { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            object-fit: cover; 
            background: #e1e1e1; 
            border: 1px solid rgba(255,255,255,0.2);
            display: block;
        }

        .online-badge {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 11px;
            height: 11px;
            background-color: #25D366;
            border: 2px solid var(--wa-teal-dark);
            border-radius: 50%;
        }
        
        .user-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            cursor: pointer; 
            overflow: hidden;
        }

        .name { 
            font-size: 16.5px; 
            font-weight: 500; 
            letter-spacing: 0.2px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status { 
            font-size: 12px; 
            opacity: 0.9; 
            margin-top: 1px; 
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 16px; 
        }

        .header-actions .icon-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer; 
            transition: background 0.2s;
        }
        .header-actions .icon-btn:active { background: rgba(255, 255, 255, 0.15); }
        .header-actions .material-icons { font-size: 22px; color: white; }

        /* Scrollable Chat Area */
        .chat-container {
            flex: 1;
            padding: 14px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background-color: var(--wa-bg-color);
            background-image: radial-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 0);
            background-size: 16px 16px;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Date Badge */
        .date-badge {
            background-color: rgba(255, 255, 255, 0.92);
            color: #54656f;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 5px 12px;
            border-radius: 8px;
            align-self: center;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px var(--wa-shadow-light);
            z-index: 2;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Messages */
        .msg-wrapper { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 8px; 
            position: relative; 
            animation: fadeInMsg 0.25s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }

        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrapper.sent { align-items: flex-end; }
        .msg-wrapper.received { align-items: flex-start; }

        .msg {
            max-width: 82%;
            padding: 7px 10px 8px 10px;
            border-radius: 12px;
            font-size: 14.5px;
            line-height: 19px;
            color: var(--wa-text-primary);
            box-shadow: 0 1px 2px var(--wa-shadow-light);
            position: relative;
            word-wrap: break-word;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .msg:active { transform: scale(0.99); }
        .msg.image-msg { padding: 4px; }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 270px;
            border-radius: 8px;
            overflow: hidden;
            background: #e2e2e2;
        }

        .img-container img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            display: block;
            border-radius: 8px;
        }

        /* Image Loader Overlay */
        .img-loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .whatsapp-spinner {
            width: 38px; height: 38px;
            border: 3.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .msg.received { 
            background-color: var(--wa-msg-received); 
            border-top-left-radius: 0px; 
        }

        .msg.sent { 
            background-color: var(--wa-msg-sent); 
            border-top-right-radius: 0px; 
        }

        /* Message Tails */
        .msg.received::before {
            content: ''; 
            position: absolute; 
            top: 0; 
            left: -8px; 
            width: 0; 
            height: 0;
            border-top: 0px solid transparent; 
            border-bottom: 10px solid transparent; 
            border-right: 10px solid var(--wa-msg-received);
        }

        .msg.sent::before {
            content: ''; 
            position: absolute; 
            top: 0; 
            right: -8px; 
            width: 0; 
            height: 0;
            border-top: 0px solid transparent; 
            border-bottom: 10px solid transparent; 
            border-left: 10px solid var(--wa-msg-sent);
        }

        /* Message Info */
        .msg-info { 
            float: right; 
            margin: 4px 0 -2px 10px; 
            display: inline-flex; 
            align-items: center; 
            gap: 3px; 
        }

        .image-msg .msg-info { 
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.45);
            padding: 2px 7px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
        }

        .image-msg .msg-time { color: #ffffff !important; }

        .msg-time { 
            font-size: 10.5px; 
            color: var(--wa-text-secondary); 
            font-weight: 400;
        }

        .tick-icon { 
            width: 15px; 
            height: 14px; 
            vertical-align: middle;
        }

        /* Bottom Input Bar - Strictly Pinned Above Keypad */
        .bottom-bar { 
            display: flex; 
            align-items: center; 
            padding: 8px 8px 10px 8px; 
            gap: 6px; 
            background: transparent; 
            z-index: 10;
            flex-shrink: 0; /* Prevents input bar from squishing */
        }

        .input-box {
            flex: 1;
            background: #ffffff;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 4px 12px;
            min-height: 46px;
            box-shadow: 0 1px 3px var(--wa-shadow-light);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .input-box .material-icons { 
            color: #8696a0; 
            font-size: 24px; 
            padding: 4px; 
            cursor: pointer; 
            transition: color 0.2s, transform 0.1s;
        }

        .input-box .material-icons:hover { color: #54656f; }
        .input-box .material-icons:active { transform: scale(0.9); }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15.5px;
            padding: 4px 8px;
            background: transparent;
            color: var(--wa-text-primary);
        }

        .input-box input::placeholder { color: #8696a0; font-weight: 400; }

        .action-btn {
            width: 46px;
            height: 46px;
            background-color: var(--wa-teal-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--wa-shadow-medium);
            flex-shrink: 0;
            transition: background-color 0.2s, transform 0.15s ease-out;
        }

        .action-btn:hover { background-color: #008f70; }
        .action-btn:active { transform: scale(0.92); }
        .action-btn .material-icons { color: white; font-size: 22px; margin-left: 2px; }

        .chat-container::-webkit-scrollbar { display: none; }

        /* Secret Button */
        .secret-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: transparent;
            z-index: 100;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Password Modal Styling */
        .modal-overlay {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 19, 23, 0.75); 
            z-index: 2000;
            display: none; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: #ffffff; 
            padding: 24px; 
            border-radius: 16px; 
            width: 84%; 
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-box h3 { color: var(--wa-text-primary); font-size: 19px; font-weight: 600; margin-bottom: 6px; }
        .modal-box p { color: var(--wa-text-secondary); font-size: 13px; margin-bottom: 14px; }

        .modal-box input {
            width: 100%; 
            padding: 12px 14px; 
            margin-bottom: 18px; 
            border: 1.5px solid #e1e1e1; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none;
            letter-spacing: 2px;
            text-align: center;
        }

        .modal-box input:focus { border-color: var(--wa-teal-dark); }

        .modal-btn-group { display: flex; justify-content: center; gap: 10px; }

        .modal-box button {
            flex: 1;
            padding: 11px; 
            border: none; 
            border-radius: 8px; 
            font-size: 14.5px; 
            font-weight: 500;
            cursor: pointer; 
        }

        .btn-primary { background: var(--wa-teal-dark); color: white; }
        .btn-danger { background: #ea868f; color: #842029; }

        /* Admin Users List View */
        #adminUsersList {
            display: none;
            flex: 1;
            background: #ffffff;
            overflow-y: auto;
        }

        .admin-list-header {
            padding: 12px 16px 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--wa-teal-dark);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: #f8f9fa;
            border-bottom: 1px solid #f0f0f0;
        }

        .user-list-item {
            display: flex; 
            align-items: center; 
            padding: 12px 16px; 
            cursor: pointer; 
            border-bottom: 1px solid #f6f6f6;
        }

        .user-list-item:hover { background-color: #f5f6f6; }
        .user-list-item .profile-pic { width: 48px; height: 48px; }

        .user-list-details { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            margin-left: 12px;
            overflow: hidden;
        }

        .user-list-name { 
            font-size: 16px; 
            font-weight: 500; 
            color: var(--wa-text-primary); 
            margin-bottom: 3px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }

        .user-list-phone { 
            font-size: 13.5px; 
            color: var(--wa-text-secondary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .delete-btn {
            padding: 8px; 
            margin-left: 8px; 
            cursor: pointer; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .delete-btn:hover { background-color: #ffebee; }
        .delete-btn .material-icons { color: #dc3545; font-size: 22px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <!-- Header -->
        <div class="header" id="appHeader">
            <div class="back-section" id="backBtn" style="display: none;" onclick="goBackToAdminList()">
                <span class="material-icons">arrow_back</span>
            </div>
            
            <div class="profile-pic-wrapper">
                <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="Profile" class="profile-pic" id="headerProfilePic">
                <div class="online-badge" id="onlineBadge"></div>
            </div>

            <div class="user-info">
                <div class="name" id="headerName">Live Support</div>
                <div class="status" id="headerStatus">typically replies instantly</div>
            </div>

            <div class="header-actions">
                <div class="icon-btn"><span class="material-icons">videocam</span></div>
                <div class="icon-btn"><span class="material-icons">call</span></div>
                <div class="icon-btn"><span class="material-icons">more_vert</span></div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container" id="chatContainer">
            <div class="date-badge">TODAY</div>
            <!-- Invisible Secret Trigger area in Middle -->
            <div class="secret-btn" onclick="openPasswordModal()"></div>
            <div id="messagesArea"></div>
        </div>

        <!-- Admin Users List Container -->
        <div id="adminUsersList"></div>

        <!-- Bottom Input Bar -->
        <div class="bottom-bar" id="bottomBar">
            <div class="input-box">
                <span class="material-icons">sentiment_satisfied_alt</span>
                <input type="text" id="msgInput" placeholder="Message" onkeypress="checkEnter(event)" autocomplete="off">
                <span class="material-icons" style="transform: rotate(-45deg);">attach_file</span>
                
                <!-- Hidden file input for native image upload -->
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadAndSendImage(event)">
                <span class="material-icons" onclick="document.getElementById('imageInput').click()">photo_camera</span>
            </div>
            
            <div class="action-btn" onclick="sendMsg()">
                <span class="material-icons" id="actionIcon">send</span>
            </div>
        </div>

        <!-- Password Modal for Secret Admin Panel -->
        <div class="modal-overlay" id="passwordModal">
            <div class="modal-box">
                <h3>Admin Access</h3>
                <p>Enter secret PIN to view dashboard</p>
                <input type="password" id="adminPassword" placeholder="••••" maxlength="8">
                <div class="modal-btn-group">
                    <button class="btn-primary" onclick="verifyAdmin()">Login</button>
                    <button class="btn-danger" onclick="closePasswordModal()">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Dynamic Keyboard Height Adjuster Script -->
    <script>
        // Automatic Dynamic Viewport Resizer for Mobile Keyboards
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const app = document.getElementById('appContainer');
                app.style.height = `${window.visualViewport.height}px`;
                const chatArea = document.getElementById('chatContainer');
                if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
            });
        }

        // Auto Scroll Chat on Input Focus
        document.getElementById('msgInput').addEventListener('focus', () => {
            setTimeout(() => {
                const chatArea = document.getElementById('chatContainer');
                if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
            }, 300);
        });
    </script>

    <!-- Firebase SDK Setup & Core Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Realtime Config
        const firebaseConfig = {
          apiKey: "AIzaSyB0asuJKj9wyoInuS6_mhLdWDo4OkAM_k4",
          authDomain: "oooo-67c5c.firebaseapp.com",
          databaseURL: "https://oooo-67c5c-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "oooo-67c5c",
          storageBucket: "oooo-67c5c.firebasestorage.app",
          messagingSenderId: "605074662310",
          appId: "1:605074662310:web:aeb1610acf19a39413e567"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ImgBB API Key for Image Uploads
        const IMGBB_API_KEY = "2fa045f121169adcec34f55432b505ae";

        // Fetch / Retrieve Local User Data
        let savedUser = JSON.parse(localStorage.getItem('oooo_user_data'));
        let clientData = {
            name: savedUser ? savedUser.name : "Guest Client",
            phone: savedUser ? savedUser.phone : "Unknown_" + Math.floor(Math.random() * 10000)
        };

        // Internal State Controllers
        let currentMode = "client"; 
        let activeChatPhone = clientData.phone; 
        let activeChatListener = null;
        let globalChatDeleteListener = null;

        // UI Reference Handles
        const chatContainer = document.getElementById('chatContainer');
        const messagesArea = document.getElementById('messagesArea');
        const msgInput = document.getElementById('msgInput');
        const adminUsersList = document.getElementById('adminUsersList');
        const bottomBar = document.getElementById('bottomBar');
        const headerName = document.getElementById('headerName');
        const headerStatus = document.getElementById('headerStatus');
        const backBtn = document.getElementById('backBtn');
        const headerProfilePic = document.getElementById('headerProfilePic');
        const onlineBadge = document.getElementById('onlineBadge');

        // SVG Ticks (WhatsApp Vector Icons)
        const singleTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#8696a0" d="M10.91 3.316l-.478-.372a.365.365 0 0 0-.51.063L5.666 9.879a.32.32 0 0 1-.484.033L3.89 8.587a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l1.547 1.512c.143.14.361.125.484-.033l4.982-6.393a.366.366 0 0 0-.064-.512z"/></svg>`;
        const doubleGreyTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#8696a0" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.32.32 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>`;
        const doubleBlueTick = `<svg class="tick-icon" viewBox="0 0 16 15"><path fill="#53bdeb" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.32.32 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>`;

        function initClientChat() {
            const userRef = ref(db, `chats/${clientData.phone}/userInfo`);
            set(userRef, { name: clientData.name, phone: clientData.phone, lastSeen: Date.now() });
            loadChatMessages(clientData.phone);
            listenForAdminDeletion(clientData.phone);
        }

        function listenForAdminDeletion(phone) {
            const chatRootRef = ref(db, `chats/${phone}`);
            if(globalChatDeleteListener) globalChatDeleteListener();
            globalChatDeleteListener = onValue(chatRootRef, (snapshot) => {
                if(currentMode === 'client' && !snapshot.exists()) messagesArea.innerHTML = '';
            });
        }

        function formatTime(ms) {
            let d = new Date(ms);
            let h = d.getHours(), m = d.getMinutes();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function loadChatMessages(phone) {
            const messagesRef = ref(db, `chats/${phone}/messages`);
            if(activeChatListener) activeChatListener();
            
            activeChatListener = onValue(messagesRef, (snapshot) => {
                const tempMsgs = Array.from(messagesArea.querySelectorAll('[id^="temp_"]'));
                messagesArea.innerHTML = '';
                
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).forEach(key => {
                        const msg = data[key];
                        renderMessage(key, msg, phone);
                        if(currentMode === 'admin' && msg.sender === 'client' && msg.status !== 'read') update(ref(db, `chats/${phone}/messages/${key}`), { status: 'read' });
                        if(currentMode === 'client' && msg.sender === 'admin' && msg.status !== 'read') update(ref(db, `chats/${phone}/messages/${key}`), { status: 'read' });
                    });
                }
                
                tempMsgs.forEach(msg => messagesArea.appendChild(msg));
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        window.renderMessage = function(key, msg, phone) {
            let isSentByMe = (currentMode === 'client' && msg.sender === 'client') || (currentMode === 'admin' && msg.sender === 'admin');
            let isImage = msg.type === 'image';
            
            let tickHTML = "";
            if (isSentByMe) {
                if (msg.status === 'sent') tickHTML = singleTick;
                else if (msg.status === 'delivered') tickHTML = doubleGreyTick;
                else if (msg.status === 'read') tickHTML = doubleBlueTick;
            }

            let alignmentClass = isSentByMe ? 'sent' : 'received';
            let msgClass = isImage ? `msg image-msg ${alignmentClass}` : `msg ${alignmentClass}`;
            
            let contentHTML = isImage 
                ? `<div class="img-container"><img src="${msg.text}" alt="Image"></div>` 
                : `${msg.text}`;

            let msgHTML = `
                <div class="msg-wrapper ${alignmentClass}" onclick="promptDelete('${key}', '${phone}')">
                    <div class="${msgClass}">
                        ${contentHTML}
                        <div class="msg-info">
                            <span class="msg-time">${formatTime(msg.timestamp)}</span>
                            ${tickHTML}
                        </div>
                    </div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', msgHTML);
        }

        // Base64 Upload Pipeline
        window.uploadAndSendImage = function(event) {
            const file = event.target.files[0];
            if(!file) return;

            event.target.value = "";

            const tempId = "temp_" + Date.now();
            const localUrl = URL.createObjectURL(file);
            
            renderTempImageMessage(tempId, localUrl);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];
                
                const formData = new FormData();
                formData.append('image', base64Image);
                
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { 
                        method: 'POST', 
                        body: formData 
                    });
                    const json = await res.json();
                    
                    if(json.success) {
                        const imgUrl = json.data.url;
                        
                        if(currentMode === 'client') {
                            const userRef = ref(db, `chats/${activeChatPhone}/userInfo`);
                            update(userRef, { name: clientData.name, phone: clientData.phone, lastSeen: Date.now() });
                        }

                        const newMsgRef = push(ref(db, `chats/${activeChatPhone}/messages`));
                        set(newMsgRef, { text: imgUrl, sender: currentMode, type: 'image', timestamp: Date.now(), status: 'sent' });

                        document.getElementById(tempId)?.remove();
                    } else {
                        markTempImageAsFailed(tempId);
                    }
                } catch(e) {
                    markTempImageAsFailed(tempId);
                }
            };
        }

        function renderTempImageMessage(tempId, localUrl) {
            let alignmentClass = 'sent';
            let msgHTML = `
                <div class="msg-wrapper ${alignmentClass}" id="${tempId}">
                    <div class="msg image-msg ${alignmentClass}">
                        <div class="img-container">
                            <img src="${localUrl}" alt="Uploading">
                            <div class="img-loading-overlay">
                                <div class="whatsapp-spinner"></div>
                            </div>
                        </div>
                        <div class="msg-info">
                            <span class="msg-time">${formatTime(Date.now())}</span>
                            <span class="material-icons" style="font-size:13px; color:#ffffff;">schedule</span>
                        </div>
                    </div>
                </div>
            `;
            messagesArea.insertAdjacentHTML('beforeend', msgHTML);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function markTempImageAsFailed(tempId) {
            const el = document.getElementById(tempId);
            if(el) {
                const overlay = el.querySelector('.img-loading-overlay');
                if(overlay) {
                    overlay.innerHTML = `
                        <div style="background:rgba(0,0,0,0.75); padding: 8px 14px; border-radius: 20px; color:white; display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px;" onclick="document.getElementById('imageInput').click();">
                            <span class="material-icons" style="font-size:18px; color:#ff6b6b;">error</span> Failed. Retry
                        </div>
                    `;
                }
            }
        }

        window.sendMsg = function() {
            let text = msgInput.value.trim();
            if (text === '') return;

            if(currentMode === 'client') {
                const userRef = ref(db, `chats/${activeChatPhone}/userInfo`);
                update(userRef, { name: clientData.name, phone: clientData.phone, lastSeen: Date.now() });
            }

            const newMsgRef = push(ref(db, `chats/${activeChatPhone}/messages`));
            set(newMsgRef, { text: text, sender: currentMode, type: 'text', timestamp: Date.now(), status: 'sent' });
            msgInput.value = '';
            
            if(currentMode === 'client') {
                setTimeout(() => {
                    get(newMsgRef).then(snap => {
                        if(snap.exists() && snap.val().status === 'sent') update(newMsgRef, { status: 'delivered' });
                    });
                }, 1500);
            }
        }

        window.promptDelete = function(msgKey, phone) {
            if(confirm("Delete this message?")) remove(ref(db, `chats/${phone}/messages/${msgKey}`));
        }

        window.deleteEntireProfile = function(phone, event) {
            event.stopPropagation();
            if(confirm("Delete this entire conversation? It will be cleared immediately from client view as well.")) {
                remove(ref(db, `chats/${phone}`));
            }
        }

        window.checkEnter = function(e) {
            if (e.key === 'Enter') sendMsg();
        }

        /* =========================================
           SECRET ADMIN MODE LOGIC
        ========================================= */
        window.openPasswordModal = function() { document.getElementById('passwordModal').style.display = 'flex'; }
        window.closePasswordModal = function() { document.getElementById('passwordModal').style.display = 'none'; document.getElementById('adminPassword').value = ''; }

        window.verifyAdmin = function() {
            const pass = document.getElementById('adminPassword').value;
            if(pass === "1234") { closePasswordModal(); enableAdminDashboard(); } else { alert("Incorrect Passcode!"); }
        }

        function enableAdminDashboard() {
            currentMode = "admin";
            chatContainer.style.display = 'none';
            bottomBar.style.display = 'none';
            adminUsersList.style.display = 'block';
            backBtn.style.display = 'none';
            onlineBadge.style.display = 'none';
            headerName.innerText = "WhatsApp Support Admin";
            headerStatus.innerText = "All Customer Live Chats";
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2021/08/04/13/06/software-developer-6521720_1280.jpg";

            const chatsRef = ref(db, 'chats');
            onValue(chatsRef, (snapshot) => {
                adminUsersList.innerHTML = '<div class="admin-list-header">Active Support Conversations</div>';
                const data = snapshot.val();
                if(data && currentMode === 'admin') {
                    Object.keys(data).forEach(phone => {
                        const user = data[phone].userInfo || { name: 'Unknown', phone: phone };
                        let lastMsgText = "No messages yet";
                        let lastMsgTime = "";
                        if(data[phone].messages) {
                            const msgs = Object.values(data[phone].messages);
                            const lastMsg = msgs[msgs.length - 1];
                            lastMsgText = lastMsg.type === 'image' ? "📷 Photo" : lastMsg.text;
                            lastMsgTime = formatTime(lastMsg.timestamp);
                        }

                        let userHTML = `
                            <div class="user-list-item" onclick="openAdminChat('${phone}', '${user.name}')">
                                <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="profile-pic">
                                <div class="user-list-details">
                                    <div class="user-list-name">
                                        <span>${user.name}</span>
                                        <span style="font-size:11.5px; font-weight:normal; color:#8696a0;">${lastMsgTime}</span>
                                    </div>
                                    <div class="user-list-phone">${lastMsgText}</div>
                                </div>
                                <div class="delete-btn" onclick="deleteEntireProfile('${phone}', event)" title="Delete Chat">
                                    <span class="material-icons">delete_outline</span>
                                </div>
                            </div>
                        `;
                        adminUsersList.insertAdjacentHTML('beforeend', userHTML);
                    });
                }
            });
        }

        window.openAdminChat = function(phone, name) {
            activeChatPhone = phone;
            adminUsersList.style.display = 'none';
            chatContainer.style.display = 'flex';
            bottomBar.style.display = 'flex';
            backBtn.style.display = 'flex';
            onlineBadge.style.display = 'block';
            headerName.innerText = name;
            headerStatus.innerText = phone;
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png";
            loadChatMessages(phone);
        }

        window.goBackToAdminList = function() {
            chatContainer.style.display = 'none';
            bottomBar.style.display = 'none';
            adminUsersList.style.display = 'block';
            backBtn.style.display = 'none';
            onlineBadge.style.display = 'none';
            headerName.innerText = "WhatsApp Support Admin";
            headerStatus.innerText = "All Customer Live Chats";
            headerProfilePic.src = "https://cdn.pixabay.com/photo/2021/08/04/13/06/software-developer-6521720_1280.jpg";
            activeChatPhone = null;
            if(activeChatListener) activeChatListener(); 
        }

        if (currentMode === "client") initClientChat();

    </script>
</body>
</html>
